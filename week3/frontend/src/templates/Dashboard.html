<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Database Dashboard & Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Analytics Dashboard</span>
            <a href="/chat_page" class="btn btn-outline-light btn-sm">Go to ChatBot</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white fw-bold">Search Week 1 Database Records</div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="db-search" class="form-control" placeholder="Search by job title, skill, or applicant name...">
                    <button class="btn btn-primary" type="button" id="search-btn">Search</button>
                </div>

                <div id="search-summary"></div>

                <div class="table-responsive">
                    <table class="table table-striped table-hover d-none" id="results-table">
    <thead class="table-dark">
        <tr>
            <th style="width: 5%; text-align: center;">#</th>
            <th style="width: 10%;">Job ID</th>
            <th style="width: 20%;">Title</th>
            <th style="width: 15%;">Company</th>
            <th style="width: 35%;">Description Snippet</th>
            <th style="width: 15%;">Tech Stack</th> </tr>
    </thead>
    <tbody id="table-body"></tbody>
</table>
                </div>
                <div id="search-status" class="text-muted text-center py-2">Enter a query above to see database entries.</div>
            </div>
        </div>

        <div class="row text-center">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold text-secondary">Job Distribution (Pie Chart)</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="position: relative; height:300px;">
                        <canvas id="jobPieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold text-secondary">Applicant Metric Distributions</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="position: relative; height:300px;">
                        <canvas id="distributionBarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "{{ backend_url }}";

        // Initialize Chart.js Elements
        const ctxPie = document.getElementById('jobPieChart').getContext('2d');
        const jobPieChart = new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: ['Software Engineer', 'Data Analyst', 'DevOps', 'UI/UX Designer'],
                datasets: [{
                    data: [12, 19, 3, 5],
                    backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxBar = document.getElementById('distributionBarChart').getContext('2d');
        const distributionBarChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Python', 'SQL', 'Docker', 'JavaScript', 'AWS'],
                datasets: [{
                    label: 'Skill Frequency in Resumes',
                    data: [45, 32, 15, 28, 10],
                    backgroundColor: '#6f42c1'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Search Functionality handling
        document.getElementById('search-btn').addEventListener('click', async () => {
            const query = document.getElementById('db-search').value.trim();
            if (!query) return;

            const status = document.getElementById('search-status');
            const summaryBox = document.getElementById('search-summary');
            const tableElement = document.getElementById('results-table');
            const tableBody = document.getElementById('table-body');

            status.textContent = "Searching database...";
            status.classList.remove('d-none');
            summaryBox.innerHTML = ''; // Reset the status banner layout

            try {
    const response = await fetch(`http://localhost:8001/api/search?q=${encodeURIComponent(query)}`);
    const data = await response.json(); 
    
    // 🔍 DEBUG LOG: Keep this open to see the exact structure in your console!
    console.log("Raw Response from API Backend:", data);

    // 🛠️ FIX: Safely find the array inside the object
    let targetRows = [];
    if (Array.isArray(data)) {
        targetRows = data; // If it's already a flat array
    } else if (data.results && Array.isArray(data.results)) {
        targetRows = data.results; // If wrapped in {"results": [...]}
    } else if (data.jobs && Array.isArray(data.jobs)) {
        targetRows = data.jobs;    // If wrapped in {"jobs": [...]}
    } else {
        // Fallback: search for ANY array property inside the object
        const foundArray = Object.values(data).find(val => Array.isArray(val));
        if (foundArray) targetRows = foundArray;
    }
    
    const totalCount = targetRows.length;
    
    // Hide original default status text
    status.classList.add('d-none');

    // 1. Inject the Summary Alert Banner
    if (totalCount > 0) {
        summaryBox.innerHTML = `
            <div class="alert alert-info d-flex justify-content-between align-items-center mb-3 fw-bold" role="alert">
                <span>🔍 Found ${totalCount} job fields matching "${query}"</span>
                <button type="button" class="btn-close" onclick="this.parentElement.remove()" aria-label="Close"></button>
            </div>
        `;
        tableElement.classList.remove('d-none'); // Show table
    } else {
        summaryBox.innerHTML = `
            <div class="alert alert-danger fw-bold mb-3" role="alert">
                ⚠️ No fields or IDs match the keyword "${query}".
            </div>
        `;
        tableElement.classList.add('d-none'); // Hide table
    }

// Clear and rebuild table rows using our verified targetRows array
tableBody.innerHTML = '';
targetRows.forEach((job, index) => {
    const row = document.createElement('tr');
    
    // Handle varying database schemas
    const jobId = job.source_id || job.id || job.job_id || 'N/A';
    const jobTitle = job.job_title || job.title || 'N/A';
    const companyName = job.company || job.company_name || 'N/A';
    const desc = job.description || job.summary || 'No description available';
    const techStack = job.tech_stack || job.skills || 'N/A';
    
    row.innerHTML = `
        <td class="fw-bold text-muted text-center align-middle" style="width: 5%;">${index + 1}</td>
        <td class="align-middle fw-semibold" style="width: 10%;">${jobId}</td>
        <td class="align-middle" style="width: 20%;">${jobTitle}</td>
        <td class="align-middle" style="width: 15%;">${companyName}</td>
        <td style="width: 35%;">
            <div style="height: 90px; overflow-y: auto; font-size: 0.85rem; padding: 8px; border: 1px solid #dee2e6; border-radius: 6px; background-color: #f8f9fa; line-height: 1.4;">
                ${desc}
            </div>
        </td>
        <td style="width: 15%;">
            <div style="height: 90px; overflow-y: auto; font-size: 0.85rem; padding: 8px; border: 1px solid #dee2e6; border-radius: 6px; background-color: #f8f9fa; line-height: 1.4;">
                ${techStack}
            </div>
        </td>
    `;
    tableBody.appendChild(row);
});

} catch (error) {
    console.error("Search failed:", error);
    status.textContent = "Error executing search request.";
    tableElement.classList.add('d-none');
}
        });
    </script>
</body>
</html>
