<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Database Dashboard & Analytics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <span class="navbar-brand mb-0 h1">Analytics Dashboard</span>
            <a href="/chat_page" class="btn btn-outline-light btn-sm">Go to ChatBot</a>
        </div>
    </nav>

    <div class="container pb-5">
        <div class="card shadow-sm mb-4">
            <div class="card-header bg-secondary text-white fw-bold">Search Week 1 Database Records</div>
            <div class="card-body">
                <div class="input-group mb-3">
                    <input type="text" id="db-search" class="form-control" placeholder="Search by job title, skill, or applicant name...">
                    <button class="btn btn-primary" type="button" id="search-btn">Search</button>
                </div>
                <div class="table-responsive">
                    <table class="table table-striped table-hover d-none" id="results-table">
                        <thead class="table-dark">
                            <tr id="table-headers"></tr>
                        </thead>
                        <tbody id="table-body"></tbody>
                    </table>
                </div>
                <div id="search-status" class="text-muted text-center py-2">Enter a query above to see database entries.</div>
            </div>
        </div>

        <div class="row text-center">
            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold text-secondary">Job Distribution (Pie Chart)</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="position: relative; height:300px;">
                        <canvas id="jobPieChart"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-md-6 mb-4">
                <div class="card shadow-sm h-100">
                    <div class="card-header bg-white fw-bold text-secondary">Applicant Metric Distributions</div>
                    <div class="card-body d-flex align-items-center justify-content-center" style="position: relative; height:300px;">
                        <canvas id="distributionBarChart"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "{{ backend_url }}";

        // Initialize Chart.js Elements with placeholder data until Backend is live
        const ctxPie = document.getElementById('jobPieChart').getContext('2d');
        const jobPieChart = new Chart(ctxPie, {
            type: 'pie',
            data: {
                labels: ['Software Engineer', 'Data Analyst', 'DevOps', 'UI/UX Designer'],
                datasets: [{
                    data: [12, 19, 3, 5],
                    backgroundColor: ['#0d6efd', '#198754', '#ffc107', '#dc3545']
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        const ctxBar = document.getElementById('distributionBarChart').getContext('2d');
        const distributionBarChart = new Chart(ctxBar, {
            type: 'bar',
            data: {
                labels: ['Python', 'SQL', 'Docker', 'JavaScript', 'AWS'],
                datasets: [{
                    label: 'Skill Frequency in Resumes',
                    data: [45, 32, 15, 28, 10],
                    backgroundColor: '#6f42c1'
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });

        // Search Functionality handling
        document.getElementById('search-btn').addEventListener('click', async () => {
            const query = document.getElementById('db-search').value.trim();
            if (!query) return;

            const status = document.getElementById('search-status');
            status.textContent = "Searching database...";

            try {
                const response = await fetch(`http://localhost:8001/api/search?q=${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.results && data.results.length > 0) {
                    status.classList.add('d-none');
                    const table = document.getElementById('results-table');
                    table.classList.remove('d-none');
                    
                    // Generate dynamic headers based on keys
                    const headersRow = document.getElementById('table-headers');
                    headersRow.innerHTML = Object.keys(data.results[0]).map(k => `<th>${k.toUpperCase()}</th>`).join('');

                    // Generate table body lines
                    const bodyRow = document.getElementById('table-body');
                    bodyRow.innerHTML = data.results.map(row => 
                        `<tr>${Object.values(row).map(v => `<td>${v}</td>`).join('')}</tr>`
                    ).join('');
                } else {
                    status.classList.remove('d-none');
                    status.textContent = "No database records found matching that query.";
                }
            } catch(e) {
                status.classList.remove('d-none');
                status.textContent = "Cannot connect to Backend service data stream.";
            }
        });
    </script>
</body>
</html>
