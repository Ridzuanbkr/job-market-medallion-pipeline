<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Resume Helper Chatbot</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        #chat-history {
            height: 400px;
            overflow-y: auto;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/Dashboard">⬅️ Back to Dashboard</a>
        </div>
    </nav>

    <div class="container py-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Resume Helper Chatbot</h4>
                    </div>
                    
                    <div class="card-body p-3" id="chat-history">
                        <div class="text-secondary text-center my-5">Start a conversation or upload a PDF resume below.</div>
                    </div>

                    <div class="card-footer bg-white p-3">
                        <div class="mb-3">
                            <label for="pdf-input" class="form-label fw-bold">Upload Resume (PDF only):</label>
                            <input type="file" id="pdf-input" class="form-control" accept=".pdf">
                        </div>
                        
                        <form id="chat-form">
                            <label for="user-message" class="form-label fw-bold">Ask Gemini about your resume:</label>
                            <div class="input-group">
                                <input type="text" id="user-message" class="form-control" placeholder="Type your message here..." required>
                                <button class="btn btn-primary" type="submit">Send Message</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const BACKEND_URL = "{{ backend_url }}";
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

        const chatHistory = document.getElementById('chat-history');
        const chatForm = document.getElementById('chat-form');
        let extractedPdfText = "";

        // Handle PDF Upload & Conversion to Text instantly on selection
        document.getElementById('pdf-input').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            appendMessage("System", "Parsing PDF layout, please wait...", "text-warning");

            const reader = new FileReader();
            reader.onload = async function () {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        fullText += textContent.items.map(item => item.str).join(" ") + "\n";
                    }
                    
                    extractedPdfText = fullText;
                    appendMessage("System", "PDF parsed successfully! The bot now holds your resume context.", "text-success fw-bold");
                } catch (error) {
                    appendMessage("System Error", "Failed to parse local PDF structure.", "text-danger");
                }
            };
            reader.readAsArrayBuffer(file);
        });

        // Handle sending message payload over JSON
        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const messageInput = document.getElementById('user-message');
            const messageText = messageInput.value.trim();
            if (!messageText) return;

            appendMessage("You", messageText, "text-dark fw-bold");
            messageInput.value = ""; // Instantly clear input field for fluid UI feel

            // Constructing Payload with absolute string insurance
            const payload = {
                message: String(messageText),
                pdf_context: extractedPdfText ? String(extractedPdfText) : ""
            };

            try {
                const response = await fetch(`${BACKEND_URL}/api/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`Server returned status ${response.status}`);
                }

                const data = await response.json();
                appendMessage("Bot", data.response || "No response field returned from backend.");
            } catch (err) {
                appendMessage("System Error", `Failed to connect to backend server. (Error: ${err.message})`, "text-danger");
            }
        });

        function appendMessage(sender, text, textClass = "") {
            const msgDiv = document.createElement('div');
            msgDiv.className = `mb-2 p-2 rounded ${textClass}`;
            msgDiv.innerHTML = `<strong>${sender}:</strong> ${text}`;
            chatHistory.appendChild(msgDiv);
            chatHistory.scrollTop = chatHistory.scrollHeight;
        }
    </script>
</body>
</html>
